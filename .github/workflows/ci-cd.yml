name: CI/CD

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deon-fin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Test frontend
        working-directory: web
        run: npm test -- --run

      - name: Typecheck frontend
        working-directory: web
        run: npm run typecheck

      - name: Lint frontend
        working-directory: web
        run: npm run lint

      - name: Build frontend
        working-directory: web
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: Build Docker image
        run: docker build -t financas-agent:ci .

  deploy:
    name: Deploy to VPS
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check deploy secrets
        id: deploy-secrets
        env:
          VPS_SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
          VPS_SSH_USER: ${{ secrets.VPS_SSH_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_FINGERPRINT: ${{ secrets.VPS_SSH_FINGERPRINT }}
        run: |
          if [ -n "$VPS_SSH_HOST" ] && [ -n "$VPS_SSH_USER" ] && [ -n "$VPS_SSH_KEY" ] && [ -n "$VPS_SSH_FINGERPRINT" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping VPS deploy because one or more VPS SSH secrets are not configured."
          fi

      - name: Deploy over SSH
        if: steps.deploy-secrets.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          fingerprint: ${{ secrets.VPS_SSH_FINGERPRINT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/projetos/financas-agent

            if [ -n "$(git status --porcelain --untracked-files=no)" ]; then
              git status --short
              echo "tracked working tree changes present; refusing deploy"
              exit 1
            fi

            git fetch deon main
            git checkout main
            git pull --ff-only deon main
            ./scripts/vps_deploy.sh
